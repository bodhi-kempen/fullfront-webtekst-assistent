# Pin Node 22 and run the unified build (frontend → backend) in one service.
# Without this, Nixpacks may detect the workspaces as separate apps.

[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x"]

[phases.install]
# --include=dev forces devDependencies (typescript, vite, tsc) even when
# Railway sets NODE_ENV=production at install time.
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
